name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go bin to PATH
        shell: pwsh
        run: |
          $gobin = Join-Path $env:USERPROFILE "go\bin"
          Add-Content -Path $env:GITHUB_PATH -Value $gobin

      - name: Build application
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build.ps1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snishaper-windows-amd64
          path: |
            build/bin/snishaper.exe
            build/bin/rules/config.json
          if-no-files-found: error

      - name: Package release bundle
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $bundleDir = Join-Path $env:RUNNER_TEMP "snishaper-$tag-windows-amd64"
          $rulesDir = Join-Path $bundleDir "rules"
          New-Item -ItemType Directory -Path $rulesDir -Force | Out-Null
          Copy-Item build/bin/snishaper.exe $bundleDir
          Copy-Item build/bin/rules/config.json $rulesDir
          Compress-Archive -Path "$bundleDir\*" -DestinationPath "build/bin/snishaper-$tag-windows-amd64.zip" -Force

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/snishaper-${{ github.ref_name }}-windows-amd64.zip
